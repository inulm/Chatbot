<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZapChat</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ── RESET & BASE ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; position: fixed; width: 100%; }

:root {
  --bg:        #08080f;
  --surface:   #0f0f1a;
  --surface2:  #161625;
  --surface3:  #1e1e30;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #e8e8f5;
  --muted:     #7070a0;
  --muted2:    #4a4a70;
  --accent:    #7c6fff;
  --accent2:   #a78bfa;
  --accent-glow: rgba(124,111,255,0.35);
  --pink:      #f472b6;
  --green:     #34d399;
  --red:       #f87171;
  --radius:    18px;
  --font-ui:   'Sora', sans-serif;
  --font-bn:   'Hind Siliguri', sans-serif;
}

body {
  font-family: var(--font-bn);
  background: var(--bg);
  color: var(--text);
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9999; opacity:0.4;
}

.ambient { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.12; animation: drift 12s ease-in-out infinite; }
.blob1 { width:500px; height:500px; background:#7c6fff; top:-150px; left:-100px; animation-delay:0s; }
.blob2 { width:400px; height:400px; background:#f472b6; bottom:-100px; right:-100px; animation-delay:-4s; }
.blob3 { width:300px; height:300px; background:#34d399; top:40%; left:50%; animation-delay:-8s; }
@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(30px,-20px) scale(1.05); }
  66% { transform: translate(-20px,30px) scale(0.95); }
}

.screen {
  position:fixed; inset:0; z-index:10; display:flex; flex-direction:column;
  opacity:0; pointer-events:none; transition: opacity 0.3s, transform 0.3s; transform: translateY(16px);
}
.screen.active { opacity:1; pointer-events:all; transform:none; }

/* AUTH SCREEN */
#authScreen { align-items:center; justify-content:center; padding: 24px; }
.auth-card { width:100%; max-width:400px; background: var(--surface); border: 1px solid var(--border2); border-radius: 28px; padding: 40px 32px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); position:relative; overflow:hidden; }
.auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, transparent, var(--accent), var(--pink), transparent); }
.brand { text-align:center; margin-bottom:36px; }
.brand-logo { width:64px; height:64px; background: linear-gradient(135deg, var(--accent), var(--pink)); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 16px; box-shadow: 0 12px 32px var(--accent-glow); animation: pulse-logo 3s ease-in-out infinite; }
@keyframes pulse-logo { 0%,100% { box-shadow: 0 12px 32px var(--accent-glow); transform:translateY(0); } 50% { box-shadow: 0 20px 48px var(--accent-glow); transform:translateY(-4px); } }
.brand-name { font-family: var(--font-ui); font-size:28px; font-weight:800; background: linear-gradient(135deg, var(--accent), var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.brand-sub { font-size:13px; color:var(--muted); margin-top:4px; }
.auth-tabs { display:flex; gap:4px; background: var(--surface2); border-radius:14px; padding:4px; margin-bottom:28px; }
.tab-btn { flex:1; padding:10px; border:none; border-radius:10px; font-family: var(--font-bn); font-size:14px; font-weight:600; cursor:pointer; transition:all 0.25s; background:transparent; color:var(--muted); }
.tab-btn.active { background: var(--surface3); color: var(--text); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
.field { margin-bottom:14px; }
.field-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; display:block; font-family:var(--font-ui); }
.field-inp { width:100%; background: var(--surface2); border: 1.5px solid var(--border2); border-radius:14px; padding:14px 16px; color: var(--text); font-family: var(--font-bn); font-size:15px; outline:none; }
.field-inp:focus { border-color:var(--accent); box-shadow: 0 0 0 3px rgba(124,111,255,0.15); }
/* FIX: disabled state for auth buttons */
.auth-btn { width:100%; padding:16px; background: linear-gradient(135deg, var(--accent), #6d5ce7); border:none; border-radius:14px; color:#fff; font-family:var(--font-ui); font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; box-shadow: 0 8px 24px var(--accent-glow); transition: opacity 0.2s; }
.auth-btn:disabled { opacity:0.5; cursor:not-allowed; }
.auth-err { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius:12px; padding:10px 14px; font-size:13px; color:var(--red); margin-top:12px; display:none; text-align:center; }
.auth-err.show { display:block; }

/* HOME SCREEN */
.home-nav { display:flex; align-items:center; gap:12px; padding:14px 18px; background: rgba(15,15,26,0.9); backdrop-filter:blur(24px); border-bottom: 1px solid var(--border); flex-shrink:0; z-index:10; }
.nav-avatar { width:40px; height:40px; border-radius:50%; background: linear-gradient(135deg, var(--accent), var(--pink)); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:#fff; }
.nav-title-wrap { flex:1; }
.nav-title { font-family:var(--font-ui); font-size:18px; font-weight:800; background: linear-gradient(135deg, var(--accent), var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.nav-sub { font-size:11px; color:var(--muted); }
.nav-logout { width:36px; height:36px; border-radius:10px; border: 1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.home-search-wrap { padding:12px 18px; background: rgba(15,15,26,0.7); flex-shrink:0; }
.home-search { display:flex; align-items:center; gap:10px; background: var(--surface2); border: 1.5px solid var(--border2); border-radius:14px; padding:10px 16px; }
.home-search-inp { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:var(--font-bn); font-size:14px; }
/* FIX: dynamic section label */
.section-label { padding:14px 18px 8px; font-family:var(--font-ui); font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px; }
.user-list { flex:1; overflow-y:auto; padding:0 12px 12px; -webkit-overflow-scrolling:touch; }
.user-item { display:flex; align-items:center; gap:14px; padding:14px; border-radius:18px; cursor:pointer; margin-bottom:4px; }
.user-item:active { background:var(--surface2); }
.ui-ava { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-ui); font-size:18px; font-weight:800; flex-shrink:0; position:relative; color:#fff; }
.ui-ava .online-ring { position:absolute; bottom:1px; right:1px; width:13px; height:13px; background:var(--green); border-radius:50%; border: 2.5px solid var(--bg); animation: onpulse 2.5s infinite; }
@keyframes onpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,.5); } 50% { box-shadow: 0 0 0 5px rgba(52,211,153,0); } }
.ui-info { flex:1; min-width:0; }
.ui-name { font-family:var(--font-ui); font-size:15px; font-weight:600; margin-bottom:3px; }
.ui-last { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ui-meta { display:flex; flex-direction:column; align-items:flex-end; gap:5px; }
.ui-time { font-size:10px; color:var(--muted2); }
.ui-badge { width:20px; height:20px; border-radius:50%; background:var(--accent); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; }
.empty-users { text-align:center; padding:60px 24px; color:var(--muted); font-size:14px; }
.spinner { width:32px; height:32px; border-radius:50%; border:3px solid var(--border2); border-top-color:var(--accent); animation:spin 0.8s linear infinite; margin:40px auto; }
@keyframes spin { to{transform:rotate(360deg)} }

/* CHAT SCREEN */
.chat-top { display:flex; align-items:center; gap:12px; padding:12px 16px; background: rgba(15,15,26,0.95); backdrop-filter:blur(24px); border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
.back-btn { width:38px; height:38px; border-radius:10px; border:1px solid var(--border2); background:transparent; color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.chat-ava { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-ui); font-size:15px; font-weight:700; color:#fff; position:relative; }
.chat-ava .online-dot { position:absolute; bottom:0; right:0; width:11px; height:11px; background:var(--green); border-radius:50%; border:2px solid var(--bg); }
.chat-info { flex:1; }
.chat-name { font-family:var(--font-ui); font-size:15px; font-weight:700; }
.chat-status { font-size:11px; color:var(--green); margin-top:2px; }
.chat-top-actions { display:flex; gap:6px; }
.cht-btn { width:36px; height:36px; border-radius:10px; border:1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* FIX: in-chat search bar (hidden by default) */
.chat-search-bar { display:none; padding:8px 16px; background:rgba(15,15,26,0.98); border-bottom:1px solid var(--border); flex-shrink:0; }
.chat-search-bar.open { display:flex; gap:8px; align-items:center; }
.chat-search-inp { flex:1; background:var(--surface2); border:1.5px solid var(--border2); border-radius:12px; padding:8px 14px; color:var(--text); font-family:var(--font-bn); font-size:14px; outline:none; }
.chat-search-inp:focus { border-color:var(--accent); }
.search-nav { display:flex; gap:4px; }
.snav-btn { background:transparent; border:1px solid var(--border2); border-radius:8px; color:var(--muted); cursor:pointer; padding:4px 10px; font-size:14px; }
.msg-highlight { background: rgba(124,111,255,0.35) !important; }

.msgs { flex:1; overflow-y:auto; padding:14px 12px; display:flex; flex-direction:column; gap:4px; -webkit-overflow-scrolling:touch; }
.date-sep { display:flex; align-items:center; gap:10px; margin:10px 0; }
.date-sep::before,.date-sep::after { content:''; flex:1; height:1px; background:var(--border); }
.date-sep span { font-size:10px; color:var(--muted2); text-transform:uppercase; font-family:var(--font-ui); }

.mrow { display:flex; align-items:flex-end; gap:7px; animation:msgIn 0.25s ease; position:relative; margin-bottom: 2px; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.mrow.me { flex-direction:row-reverse; }
.m-ava { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-ui); font-size:10px; font-weight:700; color:#fff; }
.mwrap { max-width:75%; display:flex; flex-direction:column; gap:2px; position:relative; }
.mrow.me .mwrap { align-items:flex-end; }

.bubble { padding:10px 14px; border-radius:18px; font-size:14px; line-height:1.5; word-break:break-word; position:relative; }
.mrow:not(.me) .bubble { background:var(--surface2); border:1px solid var(--border); border-bottom-left-radius:5px; }
.mrow.me .bubble { background: linear-gradient(135deg, var(--accent), #6d5ce7); border-bottom-right-radius:5px; color:#fff; box-shadow: 0 4px 14px rgba(124,111,255,0.2); }
.mtime { font-size:10px; color:var(--muted2); padding:2px 4px; font-family:var(--font-ui); }
.edited-tag { font-size:9px; color:var(--muted2); margin-left:3px; }

.reply-prev { background:rgba(255,255,255,0.07); border-left:3px solid var(--accent); border-radius:6px; padding:4px 8px; margin-bottom:6px; font-size:12px; color:rgba(255,255,255,0.6); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }
.reactions { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.react-badge { background:var(--surface3); border:1px solid var(--border2); border-radius:20px; padding:2px 6px; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:3px; }
.react-picker { position:absolute; bottom:calc(100% + 8px); background:var(--surface2); border:1px solid var(--border2); border-radius:30px; padding:6px 10px; display:none; gap:5px; z-index:100; box-shadow:0 12px 32px rgba(0,0,0,0.5); }
.react-picker.open { display:flex; }
.mrow.me .react-picker { right:0; } .mrow:not(.me) .react-picker { left:33px; }
.rp-em { font-size:22px; cursor:pointer; padding:2px; transition:transform 0.15s; }
.rp-em:hover { transform:scale(1.25); }

.msg-actions { position:absolute; top:-42px; background:var(--surface2); border:1px solid var(--border2); border-radius:14px; padding:6px; display:none; gap:4px; z-index:100; box-shadow:0 8px 24px rgba(0,0,0,0.5); }
.msg-actions.open { display:flex; }
.mrow.me .msg-actions { right:0; } .mrow:not(.me) .msg-actions { left:33px; }
.ma-btn { background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer; padding:5px 8px; border-radius:8px; font-family:var(--font-ui); }
.ma-btn.del { color:var(--red); }

/* Typing animation */
.typing-row { display:flex; align-items:flex-end; gap:7px; margin-top: 4px; }
.typing-bub { background:var(--surface2); border:1px solid var(--border); border-radius:18px; border-bottom-left-radius:5px; padding:10px 14px; display:flex; align-items:center; gap:4px; }
.t-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); animation:tdance 1.4s infinite; }
.t-dot:nth-child(2){animation-delay:.2s} .t-dot:nth-child(3){animation-delay:.4s}
@keyframes tdance { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }

.empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:40px; text-align:center; color:var(--muted); }
.reply-strip { display:none; align-items:center; gap:10px; padding:8px 16px; background:rgba(15,15,26,0.98); border-top:1px solid var(--border); flex-shrink:0; }
.reply-strip.open { display:flex; }
.reply-strip-txt { flex:1; font-size:12px; color:var(--muted); }
.reply-strip-txt span { color:var(--accent); }
.reply-cancel { background:none; border:none; color:var(--muted2); font-size:18px; cursor:pointer; }

.inputbar { display:flex; align-items:flex-end; gap:10px; padding:10px 12px 14px; background:rgba(15,15,26,0.98); border-top:1px solid var(--border); flex-shrink:0; }
.iwrap { flex:1; background:var(--surface2); border:1.5px solid var(--border2); border-radius:22px; padding:8px 14px; display:flex; align-items:flex-end; gap:8px; }
#msgInp { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:var(--font-bn); font-size:15px; line-height:1.4; max-height:90px; resize:none; min-height:22px; }
.emj-btn { background:transparent; border:none; font-size:20px; cursor:pointer; opacity:0.5; }
.send-btn { width:42px; height:42px; border-radius:50%; border:none; background:linear-gradient(135deg, var(--accent), #6d5ce7); color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.send-btn:disabled { opacity:0.3; }

.emj-panel { position:fixed; bottom:76px; left:12px; right:12px; background:var(--surface2); border:1px solid var(--border2); border-radius:18px; padding:12px; display:none; flex-wrap:wrap; gap:4px; z-index:50; box-shadow:0 -8px 32px rgba(0,0,0,0.5); }
.emj-panel.open { display:flex; }
.ep { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; }
.scbtn { position:fixed; bottom:80px; right:16px; width:40px; height:40px; border-radius:50%; background:var(--surface2); border:1px solid var(--border2); color:var(--text); font-size:18px; display:none; align-items:center; justify-content:center; z-index:20; cursor:pointer; }
.toast { position:fixed; top:18px; left:50%; transform:translateX(-50%) translateY(-24px); background:var(--surface2); border:1px solid var(--border2); border-radius:14px; padding:10px 20px; font-size:13px; z-index:9000; opacity:0; transition:all 0.3s ease; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="ambient">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="screen active" id="authScreen">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-logo">⚡</div>
      <div class="brand-name">ZapChat</div>
      <div class="brand-sub">দ্রুত, সুন্দর, সহজ চ্যাট</div>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">লগইন</button>
      <button class="tab-btn" onclick="switchTab('register')">নতুন অ্যাকাউন্ট</button>
    </div>

    <div id="loginForm">
      <div class="field">
        <label class="field-label">ইমেইল</label>
        <input class="field-inp" id="loginEmail" type="email" placeholder="তোমার ইমেইল" autocomplete="email">
      </div>
      <div class="field">
        <label class="field-label">পাসওয়ার্ড</label>
        <input class="field-inp" id="loginPass" type="password" placeholder="••••••••">
      </div>
      <button class="auth-btn" id="loginBtn" onclick="doLogin()">লগইন করো →</button>
    </div>

    <div id="registerForm" style="display:none">
      <div class="field">
        <label class="field-label">ইউজারনেম</label>
        <input class="field-inp" id="regUser" placeholder="ইউনিক নাম বেছে নাও (a-z, 0-9, _)" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label">ডিসপ্লে নাম</label>
        <input class="field-inp" id="regDisplay" placeholder="যে নামে চিনবে" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label">ইমেইল</label>
        <input class="field-inp" id="regEmail" type="email" placeholder="তোমার ইমেইল" autocomplete="email">
      </div>
      <div class="field">
        <label class="field-label">পাসওয়ার্ড</label>
        <input class="field-inp" id="regPass" type="password" placeholder="কমপক্ষে ৬ অক্ষর">
      </div>
      <button class="auth-btn" id="registerBtn" onclick="doRegister()">অ্যাকাউন্ট খোলো →</button>
    </div>

    <div class="auth-err" id="authErr"></div>
  </div>
</div>

<div class="screen" id="homeScreen">
  <div class="home-nav">
    <div class="nav-avatar" id="myAvatar">?</div>
    <div class="nav-title-wrap">
      <div class="nav-title">ZapChat</div>
      <div class="nav-sub" id="myDisplayName">লোড হচ্ছে…</div>
    </div>
    <button class="nav-logout" onclick="doLogout()" title="লগআউট">⏻</button>
  </div>

  <div class="home-search-wrap">
    <div class="home-search">
      <span class="home-search-icon">🔍</span>
      <input class="home-search-inp" id="userSearchInp" placeholder="মানুষ খোঁজো…" oninput="filterUsers(this.value)">
    </div>
  </div>

  <!-- FIX: dynamic label showing online count -->
  <div class="section-label" id="sectionLabel">সবাই</div>
  <div class="user-list" id="userList"><div class="spinner"></div></div>
</div>

<div class="screen" id="chatScreen">
  <div class="chat-top">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="chat-ava" id="chatAva">?<div class="online-dot"></div></div>
    <div class="chat-info">
      <div class="chat-name" id="chatName">—</div>
      <div class="chat-status" id="chatStatus">● অনলাইন</div>
    </div>
    <div class="chat-top-actions">
      <!-- FIX: togSearch and clrChat now implemented -->
      <button class="cht-btn" onclick="togSearch()">🔍</button>
      <button class="cht-btn" onclick="clrChat()">🗑</button>
    </div>
  </div>

  <!-- FIX: in-chat search bar -->
  <div class="chat-search-bar" id="chatSearchBar">
    <input class="chat-search-inp" id="chatSearchInp" placeholder="মেসেজ খোঁজো…" oninput="doMsgSearch(this.value)">
    <div class="search-nav">
      <button class="snav-btn" onclick="navSearch(-1)">↑</button>

<script>
const EMJS = ['😀','😂','❤️','😍','🔥','👍','😭','🙏','😊','💯','🎉','😎','🤔','😴','🥰','😅','💪','🤩','😤','🫡','😆','🥹','🫶','✨','🎊','👋','😌','😋','🤗'];
const REACT_EMJS = ['❤️','😂','😮','😢','👍','🔥'];
const COLORS = ['#7c6fff','#f472b6','#34d399','#fb923c','#60a5fa','#a78bfa','#f87171','#facc15'];

let ME = null, CHAT_WITH = null, CHAT_ID = null, replyTo = null, editingId = null;
let allUsers = {}, unsubMessages = null, unsubTyping = null, unsubUsers = null, unsubChatMeta = null, unsubUnread = null, typTimer = null;
let allChatMeta = {}, allUnread = {};

// FIX: in-chat search state
let searchMatches = [], searchIdx = 0;

function getInitial(name) { return (name || '?')[0].toUpperCase(); }
function getChatId(a, b) { return [a, b].sort().join('__'); }
function hashColor(uid) {
  let h = 0; for (let c of uid) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}
function fmtTime(ts) { if (!ts) return ''; return new Date(ts).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true }); }
function fmtDate(ts) { if (!ts) return 'আজ'; return new Date(ts).toLocaleDateString('bn-BD', { day:'numeric', month:'long' }); }

// Firebase Auth handles password security — no manual hashing needed

function toast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function showErr(msg) {
  const e = document.getElementById('authErr'); e.textContent = msg; e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 3500);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
}
window.switchTab = switchTab;

function setAuthBusy(busy) {
  // FIX: disable both auth buttons during async ops to prevent duplicate submits
  document.getElementById('loginBtn').disabled = busy;
  document.getElementById('registerBtn').disabled = busy;
  document.getElementById('loginBtn').textContent = busy ? 'অপেক্ষা করো…' : 'লগইন করো →';
  document.getElementById('registerBtn').textContent = busy ? 'অপেক্ষা করো…' : 'অ্যাকাউন্ট খোলো →';
}

function whenReady(fn) { if (window.FB_READY) fn(); else window.addEventListener('fb-ready', fn, { once: true }); }

async function doRegister() {
  const username    = document.getElementById('regUser').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const displayName = document.getElementById('regDisplay').value.trim();
  const email       = document.getElementById('regEmail').value.trim();
  const password    = document.getElementById('regPass').value;

  if (username.length < 3)  return showErr('ইউজারনেম কমপক্ষে ৩ অক্ষর হতে হবে');
  if (!displayName)          return showErr('ডিসপ্লে নাম দাও');
  if (!email)                return showErr('ইমেইল দাও');
  if (password.length < 6)  return showErr('পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে');

  setAuthBusy(true);
  try {
    // ইউজারনেম ইতিমধ্যে নেওয়া কিনা চেক করো
    const uSnap = await FB.get(FB.r('usernames/' + username));
    if (uSnap.exists()) { showErr('ইউজারনেমটি ইতিমধ্যে ব্যবহৃত!'); setAuthBusy(false); return; }

    // Firebase Auth দিয়ে অ্যাকাউন্ট তৈরি করো
    const cred  = await FB.createUserWithEmailAndPassword(email, password);
    const uid   = cred.user.uid;
    const color = hashColor(uid);

    // Realtime DB-তে profile সেভ করো
    const userData = { username, displayName, email, color, createdAt: Date.now(), online: false };
    await FB.set(FB.r('users/' + uid), userData);
    // username → uid mapping (uniqueness enforce করতে)
    await FB.set(FB.r('usernames/' + username), uid);

    ME = { uid, username, displayName, color };
    goHome();
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'এই ইমেইল দিয়ে আগেই অ্যাকাউন্ট আছে!',
      'auth/invalid-email':        'ইমেইল ঠিকমতো লিখো',
      'auth/weak-password':        'পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে',
    };
    showErr(msgs[e.code] || 'কিছু একটা ভুল হয়েছে, আবার চেষ্টা করো');
    setAuthBusy(false);
  }
}
window.doRegister = doRegister;

async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!email || !password) return showErr('সব তথ্য দাও');

  setAuthBusy(true);
  try {
    // Firebase Auth দিয়ে লগইন করো
    const cred = await FB.signInWithEmailAndPassword(email, password);
    const uid  = cred.user.uid;

    // DB থেকে profile আনো
    const snap = await FB.get(FB.r('users/' + uid));
    if (!snap.exists()) { showErr('প্রোফাইল পাওয়া যায়নি'); setAuthBusy(false); return; }
    const data = snap.val();

    ME = { uid, username: data.username, displayName: data.displayName, color: data.color };
    goHome();
  } catch(e) {
    const msgs = {
      'auth/user-not-found':      'ইমেইল পাওয়া যায়নি',
      'auth/wrong-password':      'পাসওয়ার্ড ভুল!',
      'auth/invalid-email':       'ইমেইল ঠিকমতো লিখো',
      'auth/invalid-credential':  'ইমেইল বা পাসওয়ার্ড ভুল!',
      'auth/too-many-requests':   'অনেকবার চেষ্টা হয়েছে, কিছুক্ষণ পরে আবার চেষ্টা করো',
    };
    showErr(msgs[e.code] || 'কিছু একটা ভুল হয়েছে, আবার চেষ্টা করো');
    setAuthBusy(false);
  }
}
window.doLogin = doLogin;

async function doLogout() {
  if (!confirm('লগআউট করবে?')) return;
  if (ME) FB.set(FB.r('users/' + ME.uid + '/online'), false);
  // সব listeners বন্ধ করো
  if (unsubUsers)    { unsubUsers();    unsubUsers    = null; }
  if (unsubChatMeta) { unsubChatMeta(); unsubChatMeta = null; }
  if (unsubUnread)   { unsubUnread();   unsubUnread   = null; }
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }
  if (unsubTyping)   { unsubTyping();   unsubTyping   = null; }
  ME = null; CHAT_WITH = null; CHAT_ID = null;
  await FB.signOut();          // Firebase Auth sign out
  showScreen('authScreen');
}
window.doLogout = doLogout;

function goHome() {
  if (!ME) return;
  FB.set(FB.r('users/' + ME.uid + '/online'), true);
  FB.onDisconnect(FB.r('users/' + ME.uid + '/online')).set(false);

  const av = document.getElementById('myAvatar');
  av.textContent = getInitial(ME.displayName);
  av.style.background = `linear-gradient(135deg, ${ME.color}, ${ME.color}aa)`;
  document.getElementById('myDisplayName').textContent = '@' + ME.username;

  showScreen('homeScreen');
  loadUsers();
}
window.goHome = goHome;

function loadUsers() {
  // FIX: unsubscribe old listeners before creating new ones (prevents memory leak + duplicate renders)
  if (unsubUsers) unsubUsers();
  if (unsubChatMeta) unsubChatMeta();
  if (unsubUnread) unsubUnread();

  let usersLoaded = false;

  unsubUsers = FB.onValue(FB.r('users'), snap => {
    allUsers = {};
    const data = snap.val() || {};
    Object.entries(data).forEach(([uid, u]) => { if (uid !== ME.uid) allUsers[uid] = u; });
    usersLoaded = true;
    renderUserList(allUsers);
  });

  // FIX: only re-render after users are loaded to avoid empty flash
  unsubChatMeta = FB.onValue(FB.r('chatMeta'), snap => {
    allChatMeta = snap.val() || {};
    if (usersLoaded) renderUserList(allUsers);
  });

  unsubUnread = FB.onValue(FB.r('unread/' + ME.uid), snap => {
    allUnread = snap.val() || {};
    if (usersLoaded) renderUserList(allUsers);
  });
}

function renderUserList(users) {
  const list = document.getElementById('userList');
  const entries = Object.entries(users);

  // FIX: update section label with online count
  const onlineCount = entries.filter(([,u]) => u.online).length;
  document.getElementById('sectionLabel').textContent =
    onlineCount > 0 ? `অনলাইন (${onlineCount})` : 'সবাই';

  if (!entries.length) {
    list.innerHTML = `<div class="empty-users"><div class="ico">👥</div>কোনো ইউজার নেই।</div>`; return;
  }
  list.innerHTML = '';
  entries.forEach(([uid, u]) => {
    const chatId = getChatId(ME.uid, uid);
    const meta = allChatMeta[chatId] || {};
    const unread = allUnread[chatId] || 0;

    // FIX: escape HTML to prevent XSS in user list
    const safeName = escHtml(u.displayName || uid);
    const safePreview = escHtml(meta.lastMessage || ('@' + uid));

    const item = document.createElement('div');
    item.className = 'user-item' + (unread > 0 ? ' unread' : '');
    item.onclick = () => openChat(uid, u);

    item.innerHTML = `
      <div class="ui-ava" style="background:linear-gradient(135deg,${u.color || '#7c6fff'},${u.color || '#7c6fff'}99)">
        ${getInitial(u.displayName)}
        ${u.online ? '<div class="online-ring"></div>' : ''}
      </div>
      <div class="ui-info">
        <div class="ui-name">${safeName}</div>
        <div class="ui-last">${safePreview}</div>
      </div>
      <div class="ui-meta">
        <div class="ui-time">${meta.lastTimestamp ? fmtTime(meta.lastTimestamp) : ''}</div>
        ${unread > 0 ? `<div class="ui-badge">${unread}</div>` : ''}
      </div>
    `;
    list.appendChild(item);
  });
}

// FIX: helper to escape HTML and prevent XSS
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function filterUsers(q) {
  if (!q) { renderUserList(allUsers); return; }
  const filtered = {};
  Object.entries(allUsers).forEach(([uid, u]) => {
    if (uid.includes(q.toLowerCase()) || u.displayName.toLowerCase().includes(q.toLowerCase())) filtered[uid] = u;
  });
  renderUserList(filtered);
}
window.filterUsers = filterUsers;

function openChat(uid, userData) {
  CHAT_WITH = { uid, username: uid, displayName: userData.displayName, color: userData.color || hashColor(uid) };
  CHAT_ID = getChatId(ME.uid, uid);

  // Clear unread immediately on open
  FB.remove(FB.r('unread/' + ME.uid + '/' + CHAT_ID));

  const ava = document.getElementById('chatAva');
  ava.style.background = `linear-gradient(135deg, ${CHAT_WITH.color}, ${CHAT_WITH.color}99)`;
  ava.innerHTML = getInitial(CHAT_WITH.displayName) + '<div class="online-dot"></div>';
  document.getElementById('chatName').textContent = CHAT_WITH.displayName;

  showScreen('chatScreen');
  buildEmj();

  // FIX: close search bar when opening a new chat
  document.getElementById('chatSearchBar').classList.remove('open');
  document.getElementById('chatSearchInp').value = '';
  searchMatches = []; searchIdx = 0;

  if (unsubMessages) unsubMessages();
  if (unsubTyping) unsubTyping();

  let first = true;
  let prevMsgIds = new Set();

  // FIX: track seen updates separately to avoid infinite write loop
  const pendingSeen = new Set();

  unsubMessages = FB.onValue(FB.r('chats/' + CHAT_ID + '/messages'), snap => {
    const data = snap.val() || {};
    const currentIds = new Set(Object.keys(data));

    // Only ping for genuinely new messages (not seen updates triggering re-render)
    if (!first) {
      const newIds = [...currentIds].filter(id => !prevMsgIds.has(id));
      if (newIds.length > 0) playPing();
    }
    prevMsgIds = currentIds;

    renderMsgs(data);

    // FIX: only write seen updates for messages not already processed
    Object.entries(data).forEach(([mId, m]) => {
      if (m.sender !== ME.uid && !m.seen && !pendingSeen.has(mId)) {
        pendingSeen.add(mId);
        FB.update(FB.r('chats/' + CHAT_ID + '/messages/' + mId), { seen: true, seenAt: Date.now() });
      }
    });

    if (first) { scBot(); first = false; } else setTimeout(scBot, 50);
  });

  unsubTyping = FB.onValue(FB.r('chats/' + CHAT_ID + '/typing'), snap => {
    const d = snap.val() || {};
    const other = d[CHAT_WITH.uid];
    const ex = document.getElementById('typrow');
    if (other) {
      if (!ex) {
        const row = document.createElement('div'); row.id = 'typrow'; row.className = 'typing-row';
        const av = document.createElement('div'); av.className = 'm-ava';
        av.style.background = `linear-gradient(135deg,${CHAT_WITH.color},${CHAT_WITH.color}99)`;
        av.textContent = getInitial(CHAT_WITH.displayName);
        const b = document.createElement('div'); b.className = 'typing-bub';
        b.innerHTML = '<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';
        row.appendChild(av); row.appendChild(b);
        document.getElementById('msgs').appendChild(row);
        scBot();
      }
    } else if (ex) { ex.remove(); }
  });

  // FIX: watch the chat partner's online status and update header
  FB.onValue(FB.r('users/' + uid + '/online'), snap => {
    const online = snap.val();
    document.getElementById('chatStatus').textContent = online ? '● অনলাইন' : '● অফলাইন';
    document.getElementById('chatStatus').style.color = online ? 'var(--green)' : 'var(--muted)';
    const dot = document.querySelector('#chatAva .online-dot');
    if (dot) dot.style.background = online ? 'var(--green)' : 'var(--muted2)';
  });

  FB.onDisconnect(FB.r('chats/' + CHAT_ID + '/typing/' + ME.uid)).remove();
}

function goBack() {
  if (unsubMessages) { unsubMessages(); unsubMessages = null; }
  if (unsubTyping) { unsubTyping(); unsubTyping = null; }
  clrTyp(); replyTo = null; editingId = null;
  document.getElementById('replyStrip').classList.remove('open');
  document.getElementById('msgInp').value = '';
  document.getElementById('chatSearchBar').classList.remove('open');
  showScreen('homeScreen');
}
window.goBack = goBack;

function renderMsgs(data) {
  const c = document.getElementById('msgs');
  c.innerHTML = '';
  if (!data || !Object.keys(data).length) {
    c.innerHTML = `<div class="empty-chat">💬 কোনো মেসেজ নেই।</div>`; return;
  }
  const msgs = Object.entries(data).map(([id, m]) => ({ id, ...m })).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
  let lastDate = null;
  msgs.forEach(m => {
    const d = fmtDate(m.timestamp);
    if (d !== lastDate) {
      const sep = document.createElement('div'); sep.className = 'date-sep'; sep.innerHTML = `<span>${d}</span>`;
      c.appendChild(sep); lastDate = d;
    }
    c.appendChild(makeBubble(m));
  });
}

// FIX: store message data in a WeakMap keyed by element, so actions use data not inline-encoded strings
const msgDataMap = new Map();

function makeBubble(m) {
  const isMine = m.sender === ME.uid;
  const row = document.createElement('div'); row.className = 'mrow' + (isMine ? ' me' : '');

  const wrap = document.createElement('div'); wrap.className = 'mwrap';
  const bub = document.createElement('div'); bub.className = 'bubble';

  if (m.replyTo) {
    const rp = document.createElement('div'); rp.className = 'reply-prev';
    // FIX: use textContent (not innerHTML) to prevent XSS
    rp.textContent = '↩️ ' + (m.replyTo.text || '');
    bub.appendChild(rp);
  }

  // Safe: createTextNode prevents XSS
  bub.appendChild(document.createTextNode(m.text || ''));
  if (m.edited) { const et = document.createElement('span'); et.className = 'edited-tag'; et.textContent = ' (সম্পাদিত)'; bub.appendChild(et); }

  // FIX: store message data in map so action buttons don't need inline encoded text
  msgDataMap.set(m.id, m);
  setupBubbleInteraction(bub, m, isMine);

  const t = document.createElement('div'); t.className = 'mtime';
  t.textContent = fmtTime(m.timestamp) + (isMine ? (m.seen ? ' ✓✓' : ' ✓') : '');

  // FIX: actions use data-id attribute, no inline btoa encoding
  const actions = document.createElement('div'); actions.className = 'msg-actions'; actions.id = 'act-' + m.id;

  const replyBtn = document.createElement('button');
  replyBtn.className = 'ma-btn'; replyBtn.textContent = '↩️';
  replyBtn.onclick = (e) => { e.stopPropagation(); startReply(m.id); };
  actions.appendChild(replyBtn);

  if (isMine) {
    const editBtn = document.createElement('button');
    editBtn.className = 'ma-btn'; editBtn.textContent = '✏️';
    editBtn.onclick = (e) => { e.stopPropagation(); startEdit(m.id); };

    const delBtn = document.createElement('button');
    delBtn.className = 'ma-btn del'; delBtn.textContent = '🗑';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteMsg(m.id); };

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
  }

  wrap.appendChild(actions); wrap.appendChild(bub); wrap.appendChild(t);
  row.appendChild(wrap); return row;
}

function setupBubbleInteraction(bub, m, isMine) {
  bub.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.msg-actions').forEach(el => el.style.display = 'none');
    const act = document.getElementById('act-' + m.id);
    if (act) act.style.display = act.style.display === 'flex' ? 'none' : 'flex';
  });
}

// FIX: startReply uses msgDataMap — no btoa/atob needed
function startReply(id) {
  const m = msgDataMap.get(id);
  if (!m) return;
  // FIX: include sender in replyTo so it's stored correctly
  replyTo = { id, text: m.text, sender: m.sender };
  const strip = document.getElementById('replyTxt');
  strip.innerHTML = '';
  const label = document.createElement('span'); label.textContent = '↩️ রিপ্লাই:';
  strip.appendChild(label);
  strip.appendChild(document.createTextNode(' ' + (m.text || '').slice(0, 40)));
  document.getElementById('replyStrip').classList.add('open');
  document.getElementById('msgInp').focus();
}

function cancelReply() { replyTo = null; document.getElementById('replyStrip').classList.remove('open'); }
window.cancelReply = cancelReply;

// FIX: startEdit uses msgDataMap — no btoa/atob needed
function startEdit(id) {
  const m = msgDataMap.get(id);
  if (!m) return;
  editingId = id;
  const inp = document.getElementById('msgInp');
  inp.value = m.text || '';
  document.getElementById('sendBtn').disabled = false;
  inp.focus();
}

function deleteMsg(id) {
  if (confirm('মেসেজটি ডিলিট করতে চান?')) FB.remove(FB.r('chats/' + CHAT_ID + '/messages/' + id));
}

function sendMsg() {
  const inp = document.getElementById('msgInp'); const txt = inp.value.trim();
  if (!txt || !CHAT_ID) return;

  if (editingId) {
    FB.update(FB.r('chats/' + CHAT_ID + '/messages/' + editingId), { text: txt, edited: true });
    editingId = null;
  } else {
    const msg = { text: txt, sender: ME.uid, timestamp: Date.now(), seen: false };
    // FIX: replyTo.sender is now correctly set in startReply
    if (replyTo) msg.replyTo = { text: replyTo.text.slice(0, 50), sender: replyTo.sender };
    FB.push(FB.r('chats/' + CHAT_ID + '/messages'), msg);

    FB.update(FB.r('chatMeta/' + CHAT_ID), { lastMessage: txt.slice(0, 60), lastTimestamp: Date.now(), lastSender: ME.uid });

    // Receiver unread update
    FB.get(FB.r('unread/' + CHAT_WITH.uid + '/' + CHAT_ID)).then(snap => {
      FB.set(FB.r('unread/' + CHAT_WITH.uid + '/' + CHAT_ID), (snap.val() || 0) + 1);
    });
    cancelReply();
  }
  inp.value = ''; inp.style.height = 'auto'; document.getElementById('sendBtn').disabled = true; clrTyp(); scBot();
}
window.sendMsg = sendMsg;

function setTyp(v) { if (ME && CHAT_ID) FB.set(FB.r('chats/' + CHAT_ID + '/typing/' + ME.uid), v || null); }
function clrTyp() { setTyp(null); clearTimeout(typTimer); }
function onType(el) {
  el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 90) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim();
  setTyp(true); clearTimeout(typTimer); typTimer = setTimeout(clrTyp, 2000);
}
window.onType = onType;

function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
window.onKey = onKey;

function scBot() { const c = document.getElementById('msgs'); c.scrollTop = c.scrollHeight; }
window.scBot = scBot;

function buildEmj() {
  const p = document.getElementById('epanel'); p.innerHTML = '';
  EMJS.forEach(e => {
    const d = document.createElement('div'); d.className = 'ep'; d.textContent = e;
    d.onclick = () => { const i = document.getElementById('msgInp'); i.value += e; onType(i); };
    p.appendChild(d);
  });
}
function togEmj() { document.getElementById('epanel').classList.toggle('open'); }
window.togEmj = togEmj;

// FIX: togSearch — implemented (was missing, caused ReferenceError)
function togSearch() {
  const bar = document.getElementById('chatSearchBar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open')) {
    document.getElementById('chatSearchInp').focus();
  } else {
    // Clear highlights when closing
    document.getElementById('chatSearchInp').value = '';
    document.querySelectorAll('.msg-highlight').forEach(el => el.classList.remove('msg-highlight'));
    searchMatches = []; searchIdx = 0;
  }
}
window.togSearch = togSearch;

function doMsgSearch(q) {
  document.querySelectorAll('.msg-highlight').forEach(el => el.classList.remove('msg-highlight'));
  searchMatches = [];
  if (!q.trim()) return;
  const lq = q.toLowerCase();
  document.querySelectorAll('.bubble').forEach(bub => {
    if (bub.textContent.toLowerCase().includes(lq)) {
      bub.classList.add('msg-highlight');
      searchMatches.push(bub);
    }
  });
  searchIdx = 0;
  if (searchMatches.length) searchMatches[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
}
window.doMsgSearch = doMsgSearch;

function navSearch(dir) {
  if (!searchMatches.length) return;
  searchIdx = (searchIdx + dir + searchMatches.length) % searchMatches.length;
  searchMatches[searchIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
}
window.navSearch = navSearch;

// FIX: clrChat — implemented (was missing, caused ReferenceError)
function clrChat() {
  if (!CHAT_ID) return;
  if (confirm('এই চ্যাটের সব মেসেজ ডিলিট করতে চান?')) {
    FB.remove(FB.r('chats/' + CHAT_ID + '/messages'));
    FB.remove(FB.r('chatMeta/' + CHAT_ID));
    toast('চ্যাট ক্লিয়ার হয়েছে');
  }
}
window.clrChat = clrChat;

document.addEventListener('click', () => {
  document.querySelectorAll('.msg-actions').forEach(el => el.style.display = 'none');
  document.getElementById('epanel').classList.remove('open');
});

function playPing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(600, ctx.currentTime); g.gain.setValueAtTime(0.15, ctx.currentTime);
    o.start(); o.stop(ctx.currentTime + 0.1);
  } catch(e) {}
}

// Session restore এখন onAuthStateChanged করে (firebase module script-এ)
// localStorage session আর দরকার নেই
</script>
