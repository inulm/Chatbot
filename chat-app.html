<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>তোমার চ্যাট</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { height:100%; overflow:hidden; touch-action: manipulation; }

body {
  font-family: 'Hind Siliguri', sans-serif;
  background: #0f0f13;
  color: #f0f0f5;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 90%, rgba(255,107,157,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ══ LOGIN ══ */
#login {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  transition: opacity 0.4s, transform 0.4s;
}
#login.hide { opacity: 0; pointer-events: none; transform: scale(0.95); }

.lbox {
  width: 100%; max-width: 360px;
  padding: 24px;
}

.logo-wrap {
  text-align: center;
  margin-bottom: 36px;
}
.logo-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #6c63ff, #ff6b9d);
  border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 14px;
  box-shadow: 0 16px 40px rgba(108,99,255,0.4);
  animation: fl 3s ease-in-out infinite;
}
@keyframes fl { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.logo-title { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
.logo-sub { font-size: 14px; color: #9999b0; }

.user-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

.ucard {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px;
  background: #17171e;
  border: 2px solid #2a2a38;
  border-radius: 18px;
  cursor: pointer;
  transition: all 0.2s;
  /* TOUCH FIX */
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
  position: relative;
  overflow: hidden;
}
.ucard:active { transform: scale(0.97); }
.ucard.sel {
  border-color: #6c63ff;
  background: rgba(108,99,255,0.12);
  box-shadow: 0 0 0 1px #6c63ff;
}

.ucard-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.ucard-info { flex: 1; }
.ucard-name { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
.ucard-desc { font-size: 12px; color: #9999b0; }
.ucard-check {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid #3a3a50;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  transition: all 0.2s;
  flex-shrink: 0;
}
.ucard.sel .ucard-check {
  background: #6c63ff;
  border-color: #6c63ff;
  color: #fff;
}

.enter-btn {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #6c63ff, #8b5cf6);
  color: #fff;
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 8px 28px rgba(108,99,255,0.4);
  opacity: 0.35;
  touch-action: manipulation;
}
.enter-btn.ready { opacity: 1; }
.enter-btn.ready:active { transform: scale(0.97); }

/* ══ CHAT ══ */
#chat {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s, transform 0.4s;
  transform: translateY(20px);
  z-index: 5;
}
#chat.show { opacity: 1; pointer-events: all; transform: translateY(0); }

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(23,23,30,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.top-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  position: relative;
}
.online-dot {
  position: absolute;
  bottom: 1px; right: 1px;
  width: 11px; height: 11px;
  background: #22d3a5;
  border-radius: 50%;
  border: 2px solid #17171e;
  box-shadow: 0 0 6px #22d3a5;
  animation: op 2s infinite;
}
@keyframes op { 0%,100%{box-shadow:0 0 0 0 rgba(34,211,165,.5)} 50%{box-shadow:0 0 0 4px rgba(34,211,165,0)} }
.top-info { flex: 1; }
.top-name { font-size: 15px; font-weight: 700; }
.top-status { font-size: 11px; color: #22d3a5; margin-top: 2px; }
.top-clr {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #9999b0;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
.top-clr:active { background: rgba(255,255,255,0.08); }

/* MESSAGES */
.msgs {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  -webkit-overflow-scrolling: touch;
}

.date-div {
  display: flex; align-items: center; gap: 10px;
  margin: 8px 0;
}
.date-div::before,.date-div::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(255,255,255,0.07);
}
.date-txt { font-size: 10px; color: #5a5a7a; letter-spacing: 1px; text-transform: uppercase; }

.mrow {
  display: flex;
  align-items: flex-end;
  gap: 7px;
  animation: mIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes mIn { from{opacity:0;transform:translateY(10px) scale(.95)} to{opacity:1;transform:none} }
.mrow.me { flex-direction: row-reverse; }

.mav {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0; margin-bottom: 2px;
}
.mwrap { max-width: 74%; display: flex; flex-direction: column; gap: 2px; }
.mrow.me .mwrap { align-items: flex-end; }

.bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
}
.mrow:not(.me) .bubble {
  background: #1e1e28;
  border: 1px solid rgba(255,255,255,0.07);
  border-bottom-left-radius: 5px;
}
.mrow.me .bubble {
  background: linear-gradient(135deg, #6c63ff, #8b5cf6);
  border-bottom-right-radius: 5px;
  color: #fff;
  box-shadow: 0 4px 16px rgba(108,99,255,0.3);
}
.mtime {
  font-size: 10px; color: #5a5a7a;
  padding: 0 4px;
}

/* TYPING */
.typing-row {
  display: flex; align-items: flex-end; gap: 7px;
  animation: mIn 0.3s ease;
}
.typing-bub {
  background: #1e1e28;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px;
  border-bottom-left-radius: 5px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 4px;
}
.tdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #9999b0;
  animation: td 1.4s infinite;
}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes td { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }

/* EMPTY */
.empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; text-align: center; padding: 40px;
}
.empty-icon { font-size: 48px; opacity: 0.25; animation: fl 3s ease-in-out infinite; }
.empty-txt { font-size: 14px; color: #666678; line-height: 1.7; }

/* INPUT */
.inputbar {
  display: flex; align-items: flex-end; gap: 10px;
  padding: 10px 12px;
  background: rgba(23,23,30,0.98);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.iwrap {
  flex: 1;
  background: #1e1e28;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 22px;
  padding: 10px 14px;
  display: flex; align-items: flex-end; gap: 8px;
  transition: border-color 0.2s;
}
.iwrap:focus-within { border-color: rgba(108,99,255,0.5); }

#inp {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  color: #f0f0f5;
  font-family: 'Hind Siliguri', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  max-height: 100px;
  resize: none;
  min-height: 22px;
}
#inp::placeholder { color: #5a5a7a; }

.emj-btn {
  background: transparent; border: none;
  font-size: 20px; cursor: pointer;
  opacity: 0.5; transition: opacity 0.2s;
  touch-action: manipulation;
  flex-shrink: 0; padding: 0; line-height: 1;
}
.emj-btn:active { opacity: 1; }

.send {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #6c63ff, #8b5cf6);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(108,99,255,0.4);
  touch-action: manipulation;
}
.send:active { transform: scale(0.92); }
.send:disabled { opacity: 0.3; }

/* EMOJI PANEL */
.emj-panel {
  position: fixed;
  bottom: 76px; left: 12px; right: 12px;
  background: #17171e;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 12px;
  display: none;
  flex-wrap: wrap;
  gap: 4px;
  z-index: 50;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
  animation: slideU 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.emj-panel.open { display: flex; }
@keyframes slideU { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
.ep {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  border-radius: 8px;
  cursor: pointer;
  touch-action: manipulation;
  transition: background 0.15s;
}
.ep:active { background: #2a2a38; transform: scale(1.2); }

/* TOAST */
.toast {
  position: fixed; top: 18px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #17171e;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* SCROLL BTN */
.scbtn {
  position: fixed; bottom: 80px; right: 16px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #17171e;
  border: 1px solid rgba(255,255,255,0.15);
  color: #f0f0f5;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  z-index: 20;
  touch-action: manipulation;
}
.scbtn.show { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div class="logo-wrap">
      <div class="logo-icon">💬</div>
      <div class="logo-title">তোমার চ্যাট</div>
      <div class="logo-sub">তুমি কে? নিচে সিলেক্ট করো</div>
    </div>

    <div class="user-cards">
      <div class="ucard" id="card1" onclick="pickUser(1)">
        <div class="ucard-avatar" style="background:rgba(108,99,255,0.15);">🧑</div>
        <div class="ucard-info">
          <div class="ucard-name">User 1</div>
          <div class="ucard-desc">তুমি অথবা তোমার বন্ধু</div>
        </div>
        <div class="ucard-check" id="chk1"></div>
      </div>

      <div class="ucard" id="card2" onclick="pickUser(2)">
        <div class="ucard-avatar" style="background:rgba(255,107,157,0.15);">🧒</div>
        <div class="ucard-info">
          <div class="ucard-name">User 2</div>
          <div class="ucard-desc">তুমি অথবা তোমার বন্ধু</div>
        </div>
        <div class="ucard-check" id="chk2"></div>
      </div>
    </div>

    <button class="enter-btn" id="gobtn" onclick="goChat()">চ্যাটে যাও →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="topbar">
    <div class="top-avatar" id="tav" style="background:rgba(255,107,157,0.15);">
      🧒<div class="online-dot"></div>
    </div>
    <div class="top-info">
      <div class="top-name" id="tname">—</div>
      <div class="top-status">● অনলাইন</div>
    </div>
    <button class="top-clr" onclick="clrChat()">🗑</button>
  </div>

  <div class="msgs" id="msgs"></div>

  <button class="scbtn" id="scbtn" onclick="scBot()">↓</button>

  <div class="emj-panel" id="epanel"></div>

  <div class="inputbar">
    <div class="iwrap">
      <textarea id="inp" placeholder="মেসেজ লিখো…" rows="1"
        oninput="onType(this)"
        onkeydown="onKey(event)"></textarea>
      <button class="emj-btn" onclick="togEmj()">😊</button>
    </div>
    <button class="send" id="sendbtn" onclick="sendMsg()" disabled>➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg = {
  apiKey: "AIzaSyBmXlvf2ElTEiFs3-GZkF_3wh08U0V6WHY",
  authDomain: "school-website-7b39a.firebaseapp.com",
  projectId: "school-website-7b39a",
  storageBucket: "school-website-7b39a.firebasestorage.app",
  messagingSenderId: "1087380942104",
  appId: "1:1087380942104:web:ddd2f83f211cae2eb5826d",
  databaseURL: "https://school-website-7b39a-default-rtdb.firebaseio.com"
};

const app = initializeApp(cfg);
const db = getDatabase(app);
const mRef = ref(db, 'chat/messages');
const tRef = ref(db, 'chat/typing');

// Expose to global
window._db = db; window._mRef = mRef; window._tRef = tRef;
window._ref = ref; window._push = push; window._set = set;
window._remove = remove; window._onDisconnect = onDisconnect;

// Listen messages
let first = true;
onValue(mRef, snap => {
  renderMsgs(snap.val());
  if(first){ scBot(); first=false; }
  else setTimeout(scIfNear, 80);
});

// Listen typing
onValue(tRef, snap => {
  const d = snap.val() || {};
  const me = window._me;
  const other = Object.entries(d).find(([k,v]) => k !== me && v === true);
  const ex = document.getElementById('typrow');
  if(other && me){
    if(!ex){
      const row = document.createElement('div');
      row.className = 'typing-row'; row.id = 'typrow';
      const av = document.createElement('div');
      av.className = 'mav';
      av.textContent = window._oEmj || '🧒';
      av.style.background = 'rgba(255,107,157,0.15)';
      const b = document.createElement('div');
      b.className = 'typing-bub';
      b.innerHTML = '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
      row.appendChild(av); row.appendChild(b);
      document.getElementById('msgs').appendChild(row);
      scBot();
    }
  } else { if(ex) ex.remove(); }
});

window._fbReady = true;
</script>

<script>
const EMJS = ['😀','😂','❤️','😍','🔥','👍','😭','🙏','😊','💯','🎉','😎','🤔','😴','🥰','😅','💪','🤩','😤','🫡','😆','🥹','🫶','✨','🎊','👋','😌','😋','🤗','🫠','😇'];

let myUser = null;

// ── PICK USER ──
function pickUser(n) {
  myUser = n;
  document.querySelectorAll('.ucard').forEach(c => c.classList.remove('sel'));
  document.querySelectorAll('.ucard-check').forEach(c => c.textContent = '');
  document.getElementById('card' + n).classList.add('sel');
  document.getElementById('chk' + n).textContent = '✓';
  document.getElementById('gobtn').classList.add('ready');
}
window.pickUser = pickUser;

// ── GO TO CHAT ──
function goChat() {
  if (!myUser) return;
  const names = { 1: 'User 1', 2: 'User 2' };
  const emjs = { 1: '🧑', 2: '🧒' };
  const colors = { 1: 'rgba(108,99,255,0.15)', 2: 'rgba(255,107,157,0.15)' };
  const other = myUser === 1 ? 2 : 1;

  window._me = 'User' + myUser;
  window._myEmj = emjs[myUser];
  window._oEmj = emjs[other];

  document.getElementById('tname').textContent = names[other];
  const tav = document.getElementById('tav');
  tav.style.background = colors[other];
  tav.innerHTML = emjs[other] + '<div class="online-dot"></div>';

  document.getElementById('login').classList.add('hide');
  document.getElementById('chat').classList.add('show');

  // Typing disconnect cleanup
  if(window._fbReady) {
    const myT = window._ref(window._db, 'chat/typing/User' + myUser);
    window._onDisconnect(myT).remove();
  }

  buildEmj();
  document.getElementById('inp').focus();
}
window.goChat = goChat;

// ── RENDER MESSAGES ──
function renderMsgs(data) {
  const c = document.getElementById('msgs');
  const tr = document.getElementById('typrow');

  c.innerHTML = '';

  if (!data || !Object.keys(data).length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">💭</div><div class="empty-txt">এখনো কোনো মেসেজ নেই।<br>প্রথম মেসেজ পাঠাও! 👋</div></div>`;
    if(tr) c.appendChild(tr);
    return;
  }

  const msgs = Object.entries(data)
    .map(([id, m]) => ({ id, ...m }))
    .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

  let lastDate = null;
  msgs.forEach(m => {
    const d = m.timestamp ? new Date(m.timestamp).toLocaleDateString('bn-BD', { day:'numeric', month:'long' }) : 'আজ';
    if (d !== lastDate) {
      const div = document.createElement('div');
      div.className = 'date-div';
      div.innerHTML = `<span class="date-txt">${d}</span>`;
      c.appendChild(div);
      lastDate = d;
    }
    c.appendChild(makeBubble(m));
  });

  if(tr) c.appendChild(tr);
}

function makeBubble(m) {
  const me = window._me;
  const isMine = m.sender === me;
  const emj = m.sender === 'User1' ? '🧑' : '🧒';
  const clr = m.sender === 'User1' ? 'rgba(108,99,255,0.15)' : 'rgba(255,107,157,0.15)';
  const time = m.timestamp
    ? new Date(m.timestamp).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true })
    : '';

  const row = document.createElement('div');
  row.className = 'mrow' + (isMine ? ' me' : '');

  const av = document.createElement('div');
  av.className = 'mav';
  av.textContent = emj;
  av.style.background = clr;

  const wrap = document.createElement('div');
  wrap.className = 'mwrap';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = m.text;

  const t = document.createElement('div');
  t.className = 'mtime';
  t.textContent = time + (isMine ? ' ✓✓' : '');

  wrap.appendChild(bub);
  wrap.appendChild(t);
  row.appendChild(av);
  row.appendChild(wrap);
  return row;
}

// ── SEND ──
function sendMsg() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt || !window._me) return;
  window._push(window._mRef, { text: txt, sender: window._me, timestamp: Date.now() });
  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('sendbtn').disabled = true;
  clrTyp();
  scBot();
}
window.sendMsg = sendMsg;

// ── TYPING ──
let typTimer = null;
function setTyp(v) {
  if(!window._me || !window._fbReady) return;
  const r = window._ref(window._db, 'chat/typing/' + window._me);
  window._set(r, v || null);
}
function clrTyp() { setTyp(null); clearTimeout(typTimer); }

function onType(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  document.getElementById('sendbtn').disabled = !el.value.trim();
  setTyp(true);
  clearTimeout(typTimer);
  typTimer = setTimeout(clrTyp, 2000);
}
window.onType = onType;

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
window.onKey = onKey;

// ── SCROLL ──
function scBot() {
  const c = document.getElementById('msgs');
  c.scrollTop = c.scrollHeight;
  document.getElementById('scbtn').classList.remove('show');
}
window.scBot = scBot;

function scIfNear() {
  const c = document.getElementById('msgs');
  const near = c.scrollHeight - c.scrollTop - c.clientHeight < 120;
  if(near) scBot();
  else document.getElementById('scbtn').classList.add('show');
}

document.getElementById('msgs').addEventListener('scroll', function() {
  const near = this.scrollHeight - this.scrollTop - this.clientHeight < 120;
  document.getElementById('scbtn').classList.toggle('show', !near);
});

// ── EMOJI ──
function buildEmj() {
  const p = document.getElementById('epanel');
  EMJS.forEach(e => {
    const d = document.createElement('div');
    d.className = 'ep';
    d.textContent = e;
    d.onclick = () => {
      const i = document.getElementById('inp');
      i.value += e;
      i.dispatchEvent(new Event('input'));
      onType(i);
      i.focus();
    };
    p.appendChild(d);
  });
}

function togEmj() {
  document.getElementById('epanel').classList.toggle('open');
}
window.togEmj = togEmj;

document.addEventListener('click', e => {
  if(!e.target.closest('.emj-btn') && !e.target.closest('.emj-panel'))
    document.getElementById('epanel').classList.remove('open');
});

// ── CLEAR ──
function clrChat() {
  if(!confirm('সব মেসেজ ডিলিট করবে?')) return;
  window._remove(window._mRef);
  toast('🗑 চ্যাট ক্লিয়ার হয়েছে');
}
window.clrChat = clrChat;

// ── TOAST ──
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
